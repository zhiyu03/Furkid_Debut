<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>毛孩子出道 — UI 效果图（线框）</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: linear-gradient(160deg, #fef9c3 0%, #fce7f3 40%, #e0f2fe 100%);
      display: flex;
      justify-content: center;
      padding: 12px;
    }
    .phone {
      width: 100%;
      max-width: 390px;
      height: min(100vh - 24px, 780px);
      max-height: calc(100vh - 24px);
      background: #f4f4f5;
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      flex: 0 0 auto;
      padding: 8px 12px 6px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: #374151;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
    }
    .top-row {
      display: flex;
      /* 主图区优先占满剩余竖向空间 */
      flex: 1 1 auto;
      min-height: 42vh;
      gap: 8px;
      padding: 10px;
      background: #e4e4e7;
    }
    .sidebar {
      flex: 0 0 34%;
      background: #d4d4d8;
      border-radius: 12px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sidebar h3 {
      margin: 0 0 4px;
      font-size: 11px;
      color: #52525b;
    }
    .sidebar .hint {
      font-size: 9px;
      color: #71717a;
      margin-bottom: 4px;
    }
    .chip {
      background: #3b82f6;
      color: #fff;
      border-radius: 10px;
      padding: 8px 6px;
      font-size: 9px;
      line-height: 1.35;
      box-shadow: 0 2px 6px rgba(59,130,246,.35);
    }
    .chip ul { margin: 0; padding-left: 12px; }
    .image-area {
      flex: 1;
      background: #22c55e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(0,0,0,.2);
    }
    .divider-note {
      flex: 0 0 auto;
      padding: 4px 10px;
      font-size: 9px;
      color: #64748b;
      text-align: center;
      background: #fafafa;
      border-top: 1px dashed #cbd5e1;
    }
    .tabs {
      flex: 0 0 auto;
      display: flex;
      gap: 6px;
      padding: 6px 8px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 6px 4px;
      font-size: 10px;
      font-weight: 600;
      border-radius: 10px;
      background: #f1f5f9;
      color: #475569;
      border: 2px solid transparent;
    }
    .tab.active {
      background: #fff7ed;
      border-color: #fb923c;
      color: #c2410c;
    }
    .grid-wrap {
      /* 黄区压缩：固定上限，多内容时内部滚动，把竖向空间让给主图 */
      flex: 0 1 auto;
      max-height: 22vh;
      min-height: 0;
      padding: 6px 8px 8px;
      background: #fefce8;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .grid-wrap h4 {
      margin: 0 0 4px;
      font-size: 9px;
      color: #854d0e;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .tile {
      height: 46px;
      width: 100%;
      background: #facc15;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #713f12;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,.06);
    }
    footer-cta {
      flex: 0 0 auto;
      display: block;
      padding: 10px 12px 14px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 999px;
      background: #f43f5e;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      cursor: default;
    }
    .caption {
      max-width: 390px;
      margin: 12px auto 0;
      font-size: 11px;
      color: #64748b;
      line-height: 1.5;
      padding: 0 8px;
    }
  </style>
</head>
<body>
  <div>
    <div class="phone">
      <header>毛孩子出道计划 · 效果图（线框）</header>
      <div class="top-row">
        <aside class="sidebar">
          <h3>已选装扮</h3>
          <p class="hint">左侧蓝块：当前主题下用户点选的装饰（可滚动）</p>
          <div class="chip">
            <strong>头饰 · 蝴蝶结</strong>
            <ul><li>已应用</li></ul>
          </div>
          <div class="chip">
            <strong>衣物 · 卫衣</strong>
            <ul><li>已应用</li></ul>
          </div>
        </aside>
        <section class="image-area">图片区域<br /><span style="font-size:11px;font-weight:500;opacity:.95">宠物主图 / 上传后预览</span></section>
      </div>
      <p class="divider-note">下方：上排 Tab = 头饰 / 妆容 / 造型 / 衣服 · 下黄格 = 当前 Tab 对应可选内容</p>
      <div class="tabs">
        <div class="tab active">头饰</div>
        <div class="tab">妆容</div>
        <div class="tab">造型</div>
        <div class="tab">衣服</div>
      </div>
      <div class="grid-wrap">
        <h4>黄区（压缩 · 可滚动）· 当前「头饰」</h4>
        <div class="grid">
          <div class="tile">🎀</div>
          <div class="tile">👑</div>
          <div class="tile">🌸</div>
          <div class="tile">🧢</div>
        </div>
      </div>
      <footer-cta>
        <button type="button" class="btn">开始变装</button>
      </footer-cta>
    </div>
    <p class="caption">
      布局原则：<strong>主图区（上排绿）优先占高</strong>；黄区 <code>max-height: 22vh</code> 且可滚动，避免抢竖屏空间。用浏览器直接打开本文件即可查看。
    </p>
  </div>
</body>
</html>
