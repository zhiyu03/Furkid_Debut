<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>变装完成 · 效果图（线框）</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: linear-gradient(180deg, #fdf4ff 0%, #f8fafc 40%, #ecfeff 100%);
      display: flex;
      justify-content: center;
      padding: 12px;
    }
    .phone {
      width: 100%;
      max-width: 390px;
      height: min(100vh - 24px, 820px);
      max-height: calc(100vh - 24px);
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      padding: 12px 16px 8px;
      text-align: center;
      border-bottom: 1px solid #f1f5f9;
    }
    .topbar h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      color: #be185d;
    }
    .topbar p {
      margin: 4px 0 0;
      font-size: 11px;
      color: #64748b;
    }
    .pill-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px 0;
    }
    .pill {
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      border: 2px solid #e2e8f0;
      background: #f8fafc;
      color: #64748b;
    }
    .pill.on {
      background: linear-gradient(135deg, #fce7f3, #ddd6fe);
      border-color: #d946ef;
      color: #86198f;
    }
    .hero {
      flex: 1;
      min-height: 0;
      margin: 10px 14px 8px;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }
    .hero .layer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,.25);
    }
    .hero .before {
      background: linear-gradient(160deg, #94a3b8, #64748b);
      opacity: 0;
      pointer-events: none;
    }
    .hero .after {
      background: linear-gradient(145deg, #34d399, #059669);
    }
    .hero .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: rgba(0,0,0,.45);
      color: #fff;
      backdrop-filter: blur(4px);
    }
    .thumb-row {
      display: flex;
      gap: 10px;
      padding: 0 14px 12px;
      align-items: stretch;
    }
    .thumb {
      flex: 1;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #e2e8f0;
      text-align: center;
    }
    .thumb span {
      display: block;
      font-size: 10px;
      padding: 4px;
      background: #f8fafc;
      color: #64748b;
      font-weight: 600;
    }
    .thumb .box {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #475569;
    }
    .thumb.before .box { background: linear-gradient(180deg, #e2e8f0, #cbd5e1); }
    .thumb.after { border-color: #f472b6; }
    .thumb.after .box { background: linear-gradient(180deg, #fbcfe8, #f9a8d4); }
    .actions {
      padding: 8px 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn-primary {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #f43f5e, #ec4899);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
    }
    .btn-ghost {
      width: 100%;
      padding: 12px;
      border-radius: 999px;
      border: 2px solid #e2e8f0;
      background: #fff;
      color: #475569;
      font-size: 13px;
      font-weight: 600;
    }
    .note {
      max-width: 390px;
      margin: 10px auto 0;
      font-size: 11px;
      color: #64748b;
      line-height: 1.55;
      padding: 0 10px;
    }
  </style>
</head>
<body>
  <div>
    <div class="phone">
      <div class="topbar">
        <h1>变装完成</h1>
        <p>大图看效果 · 下方可快速对比原图</p>
      </div>
      <div class="pill-row">
        <span class="pill">原图</span>
        <span class="pill on">效果</span>
      </div>
      <div class="hero">
        <div class="layer before">原图预览区（示意）</div>
        <div class="layer after">主展示：变装后大图（示意）</div>
        <span class="badge">当前 · 效果</span>
      </div>
      <div class="thumb-row">
        <div class="thumb before">
          <span>原图</span>
          <div class="box">缩略</div>
        </div>
        <div class="thumb after">
          <span>效果</span>
          <div class="box">缩略</div>
        </div>
      </div>
      <div class="actions">
        <button type="button" class="btn-primary">再来一次</button>
        <button type="button" class="btn-ghost">长按图片保存（示意）</button>
      </div>
    </div>
    <p class="note">
      <strong>设计要点（供开发对照）：</strong>① 结果页以<strong>单张大图</strong>为主，用「原图 / 效果」胶囊切换或滑动对比，避免两列等分抢视线；② 底部小双栏作<strong>缩略对照</strong>；③ 主按钮「再来一次」保持品牌色，次要操作为线框按钮。正式实现时可接 <code>ResultView.jsx</code> 与真实 <code>img</code> 地址。
    </p>
  </div>
</body>
</html>
